deptrac:
  paths:
    - ./src
  layers:
    - name: Application
      collectors:
        - type: classLike
          value: CloudCreativity\\Modules\\Contracts\\Application\\*
        - type: classLike
          value: CloudCreativity\\Modules\\Application\\*
    - name: Bus
      collectors:
        - type: classLike
          value: CloudCreativity\\Modules\\Contracts\\Bus\\*
        - type: classLike
          value: CloudCreativity\\Modules\\Bus\\*
    - name: Domain
      collectors:
        - type: classLike
          value: CloudCreativity\\Modules\\Contracts\\Domain\\*
        - type: classLike
          value: CloudCreativity\\Modules\\Domain\\*
    - name: Infrastructure
      collectors:
        - type: classLike
          value: CloudCreativity\\Modules\\Contracts\\Infrastructure\\*
        - type: classLike
          value: CloudCreativity\\Modules\\Infrastructure\\*
        - type: classLike
          value: Monolog\\*
    - name: Messaging
      collectors:
        - type: classLike
          value: CloudCreativity\\Modules\\Contracts\\Messaging\\*
        - type: classLike
          value: CloudCreativity\\Modules\\Messaging\\*
    - name: PSR Container
      collectors:
        - type: classLike
          value: Psr\\Container\\*
    - name: PSR Log
      collectors:
        - type: classLike
          value: Psr\\Log\\*
    - name: Toolkit
      collectors:
        - type: classLike
          value: CloudCreativity\\Modules\\Contracts\\Toolkit\\*
        - type: classLike
          value: CloudCreativity\\Modules\\Toolkit\\*
        - type: classLike
          value: Ramsey\\Uuid\\*
        - type: classLike
          value: ^Deprecated$
  ruleset:
    Application:
      - Bus
      - Domain
      - Messaging
      - PSR Container
      - PSR Log
      - Toolkit
    Bus:
      - Messaging
      - PSR Container
      - PSR Log
      - Toolkit
    Domain:
      - Toolkit
    Infrastructure:
      - Application
      - Bus
      - Messaging
      - PSR Container
      - PSR Log
      - Toolkit
    Messaging:
      - Toolkit
    Toolkit:
